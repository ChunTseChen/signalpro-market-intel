collect_intelligence:
  description: >
    搜尋過去一週內 AI 領域的重大發展，涵蓋以下面向：
    1. **新產品與模型發布**：新的 LLM、AI Agent 框架、多模態模型等
    2. **重大融資與併購**：AI 公司的融資輪次、併購案、估值變化
    3. **研究突破**：重要論文、基準測試突破、新技術架構
    4. **法規與政策**：AI 監管動態、政府政策、國際合作
    5. **企業戰略**：大型科技公司的 AI 戰略調整、合作夥伴關係
    6. **基礎設施**：GPU/TPU 供應鏈、雲端 AI 服務、開源生態

    搜尋策略：
    - 使用多組關鍵字進行搜尋（如 "AI news this week", "LLM release 2026",
      "AI funding round", "AI regulation", "AI agent framework"）
    - 對高相關性結果抓取完整內容以獲得更多細節
    - 為每條新聞評估相關性分數 (0-1)
    - 最終整理出至少 15 條高品質新聞條目

    當前日期：{current_date}
    關注主題：{topic}
  expected_output: >
    一份結構化的情報蒐集結果，包含：
    1. 至少 15 條新聞條目，每條包含：標題、來源、URL、摘要、相關性分數
    2. 按主題分類的歸納整理（模型發布、融資、研究、法規、戰略、基礎設施）
    3. 本週最值得關注的 Top 5 發展簡述
  agent: news_collector

analyze_market:
  description: >
    基於情報蒐集結果，進行深度市場分析：

    1. **趨勢識別**：從蒐集的新聞中識別 3-5 個關鍵市場趨勢，
       每個趨勢需包含：名稱、詳細描述、影響程度（高/中/低）、關鍵參與者、支持證據

    2. **競爭格局分析**：分析主要 AI 公司（如 OpenAI, Google, Meta, Anthropic,
       Microsoft, xAI 等）的最新動態和戰略方向

    3. **機會與風險評估**：
       - 識別 3-5 個潛在機會（技術應用、市場缺口、合作可能）
       - 識別 3-5 個潛在風險（技術瓶頸、監管壓力、競爭威脅）

    4. **戰略影響評估**：這些發展對 AI 從業者和企業意味著什麼？

    分析時請保持客觀，區分事實與推測，用數據支撐判斷。
  expected_output: >
    一份完整的市場分析結果，包含：
    1. 3-5 個趨勢分析（含名稱、描述、影響程度、關鍵玩家、證據）
    2. 主要競爭者動態分析
    3. 機會清單（3-5 項）
    4. 風險清單（3-5 項）
    5. 整體戰略影響評估
  agent: market_analyst

write_report:
  description: >
    將所有蒐集的情報和分析結果合成為一份完整的繁體中文市場情報報告。

    報告結構（必須包含以下所有章節）：

    # AI 市場情報日報 — {current_date}

    ## 一、執行摘要
    （200-300 字，概述本週最重要的發現和建議）

    ## 二、市場概覽
    （本週 AI 市場整體動態概述）

    ## 三、關鍵發展
    （按類別整理的重大新聞，每條附來源連結）

    ## 四、趨勢分析
    （3-5 個識別出的趨勢，含詳細分析）

    ## 五、競爭格局
    （主要玩家的動態和戰略分析）

    ## 六、機會與風險
    （分列機會和風險，附評估說明）

    ## 七、戰略建議
    （基於以上分析的可行動建議）

    ## 八、資料來源
    （列出所有引用的來源和連結）

    寫作要求：
    - 全文以繁體中文撰寫
    - 關鍵技術術語附英文原文，格式如：大型語言模型 (LLM)
    - 目標字數 2000-3000 字
    - 使用 Markdown 格式，善用標題、列表、粗體等排版
    - 語調專業客觀，避免過度主觀推測
    - 每個重要論點需有事實依據
  expected_output: >
    一份 2000-3000 字的繁體中文 Markdown 格式市場情報報告，
    包含完整的八個章節（執行摘要、市場概覽、關鍵發展、趨勢分析、
    競爭格局、機會與風險、戰略建議、資料來源），
    關鍵術語附英文原文，格式專業規範。
  agent: report_writer
